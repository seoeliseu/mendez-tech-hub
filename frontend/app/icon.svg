<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- surface -->
  <rect width="32" height="32" rx="7" fill="#0f1220"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#1f2540" stroke-width="1"/>

  <!-- edges (hub -> nodes) -->
  <g stroke="url(#g)" stroke-width="1.6" stroke-linecap="round" opacity="0.5">
    <line x1="16" y1="16" x2="8"  y2="8"/>
    <line x1="16" y1="16" x2="24" y2="8"/>
    <line x1="16" y1="16" x2="8"  y2="24"/>
    <line x1="16" y1="16" x2="24" y2="24"/>
  </g>

  <!-- satellite nodes (distributed services / concepts) -->
  <circle cx="8"  cy="8"  r="2.6" fill="#818cf8"/>
  <circle cx="24" cy="8"  r="2.6" fill="#38bdf8"/>
  <circle cx="8"  cy="24" r="2.6" fill="#38bdf8"/>
  <circle cx="24" cy="24" r="2.6" fill="#4ade80"/>

  <!-- central hub -->
  <circle cx="16" cy="16" r="4.6" fill="url(#g)" stroke="#0f1220" stroke-width="1.3"/>
  <circle cx="16" cy="16" r="1.7" fill="#0f1220"/>
</svg>
